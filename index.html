<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>서커스 테트리스: 그랜드 피날레 (모바일 완벽 최적화)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

        body {
            margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: 100dvh; /* 최신 모바일 브라우저 주소창 높이 대응 */
            width: 100vw;
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
            font-family: 'Jua', sans-serif; color: white; overflow: hidden;
            touch-action: none; /* 새로고침 방지 */
            user-select: none; -webkit-user-select: none; /* 텍스트 선택 방지 */
        }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* 시작 화면 */
        #start-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        #player-name-input {
            padding: 15px; font-size: 20px; border-radius: 10px; border: none; 
            margin: 20px; font-family: 'Jua'; text-align: center; width: 80%; max-width: 300px;
        }

        /* 메인 컨테이너 (PC 기준) */
        #main-wrapper {
            display: flex; flex-direction: row; gap: 20px; align-items: center; justify-content: center;
            width: 100%; max-width: 1000px; padding: 10px; box-sizing: border-box;
        }

        /* 왼쪽 UI */
        #ui-left-top {
            display: flex; flex-direction: column; gap: 10px; width: 180px; z-index: 100;
        }
        .ui-box {
            background: rgba(0, 0, 0, 0.8); border: 3px solid #ffcc00;
            border-radius: 20px; padding: 12px; text-align: center; backdrop-filter: blur(10px);
        }

        /* 랭킹 스타일 */
        .rank-item { font-size: 14px; margin: 5px 0; display: flex; justify-content: space-between; }

        /* 게임 메인 컨테이너 */
        #main-container {
            display: flex; width: 700px; height: 600px;
            background: rgba(255, 255, 255, 0.05); border: 5px solid #ff4d4d;
            border-radius: 30px; position: relative; overflow: hidden;
        }

        #game-section { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; border-right: 2px solid #ff4d4d; }
        canvas#tetris { height: 90%; max-height: 540px; background: #000; border: 2px solid #fff; }

        #control-section { width: 250px; display: flex; flex-direction: column; justify-content: space-around; align-items: center; padding: 20px; box-sizing: border-box; z-index: 5;}

        /* 커튼 연출 */
        .curtain { position: absolute; top: 0; width: 50%; height: 100%; background: white; z-index: 500; transition: transform 1.5s ease-in-out; pointer-events: none; }
        #curtain-left { left: 0; transform: translateX(-100%); }
        #curtain-right { right: 0; transform: translateX(100%); }
        #main-container.game-over #curtain-left { transform: translateX(0); }
        #main-container.game-over #curtain-right { transform: translateX(0); }

        /* 결과 화면 */
        #result-screen { position: absolute; inset: 0; z-index: 600; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #final-score-num { font-size: 80px; color: #ff4d4d; text-shadow: 2px 2px 0 #000; margin: 20px; text-align: center; }
        .petal { position: absolute; z-index: 700; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(700px) rotate(360deg); } }

        /* 버튼 및 기타 UI */
        .btn { width: 100%; max-width: 180px; padding: 12px; font-size: 20px; font-family: 'Jua'; border: none; border-radius: 50px; cursor: pointer; color: white; }
        .start-btn { background: #ff4d4d; margin-bottom: 10px;}
        .reset-btn { background: #6366f1; }
        #gold-display { background: #444; padding: 10px; border-radius: 15px; font-weight: bold; border: 2px solid #666; color: #888; text-align: center; width: 100%; box-sizing: border-box;}
        #gold-display.active { background: linear-gradient(45deg, #ffd700, #b45309); border-color: white; color: #422006; }

        /* 모바일 조작 키 UI (PC에선 숨김) */
        #mobile-controls { display: none; }

        /* ========================================= */
        /* 모바일 전용 반응형 레이아웃 (완벽 최적화) */
        /* ========================================= */
        @media (max-width: 800px) {
            body { padding: 5px; box-sizing: border-box; }
            #start-screen h1 { font-size: 32px !important; margin: 10px; }
            #player-name-input { margin: 10px; padding: 10px; font-size: 16px; }

            /* 전체 래퍼: 세로 정렬 및 스크롤 금지 */
            #main-wrapper { 
                flex-direction: column; 
                height: 100%; width: 100%; 
                padding: 0; margin: 0; gap: 5px;
                justify-content: flex-start;
            }

            /* 1. 상단 정보창: 가로 한 줄로 압축 */
            #ui-left-top { 
                width: 100%; flex-direction: row; gap: 5px; margin: 0; justify-content: center; 
            }
            .ui-box { flex: 1; padding: 5px; font-size: 10px; border-width: 2px; border-radius: 12px; margin:0; }
            .ui-box canvas { height: 35px !important; width: auto; }
            #score-val { font-size: 18px !important; }
            .ui-box:nth-child(3) { display: none; } /* 랭킹 숨김 (공간 확보) */

            /* 2. 메인 게임 및 스테이지 UI 컨테이너 */
            #main-container { 
                width: 100%; flex: 1; min-height: 0; /* 이 설정이 있어야 캔버스가 작아짐 */
                flex-direction: column; 
                border-width: 2px; border-radius: 15px; margin: 0;
            }

            /* 2-1. 게임 화면 캔버스 영역 */
            #game-section { 
                flex: 1; min-height: 0; border-right: none; border-bottom: 2px solid #ff4d4d; 
                padding: 5px; display: flex; align-items: center; justify-content: center;
            }
            canvas#tetris { 
                height: 100%; max-height: 100%; width: auto; max-width: 100%; 
                aspect-ratio: 12 / 20; /* 찌그러짐 방지 비율 고정 */
                object-fit: contain; 
            }

            /* 2-2. 중앙 컨트롤 정보창 (가로 한 줄 압축) */
            #control-section { 
                width: 100%; flex-direction: row; gap: 5px; padding: 5px;
            }
            #control-section > div { flex: 1; padding: 5px; font-size: 10px; margin: 0; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
            #control-section h2 { font-size: 13px; margin: 0; }
            #control-section p { margin: 2px 0; font-size: 9px; }
            #gold-display { font-size: 11px; padding: 0; border-width: 1px; }
            .btn { flex: 1; max-width: none; margin: 0; padding: 5px; font-size: 14px; border-radius: 10px; }
            .pc-desc { display: none; } 

            /* 3. 모바일 조작 패드 */
            #mobile-controls { 
                display: flex; width: 100%; max-width: 500px; 
                flex-direction: column; gap: 5px; margin: 0 auto; 
                padding-bottom: env(safe-area-inset-bottom, 5px); /* 아이폰 하단 홈 바 영역 띄우기 */
            }
            .control-row { display: flex; gap: 5px; width: 100%; justify-content: center; }
            .m-btn { 
                flex: 1; height: 45px; font-size: 18px; font-weight: bold; border-radius: 10px;
                background: rgba(255, 255, 255, 0.2); border: 2px solid #fff; color: white;
                cursor: pointer; display: flex; justify-content: center; align-items: center;
                touch-action: manipulation; /* 버튼 연타 시 화면 확대 완벽 차단 */
            }
            .m-btn:active { background: rgba(255, 255, 255, 0.5); }
            .m-btn.hard { background: #ff4d4d; height: 40px; font-size: 15px;}
            .m-btn.gold-btn { background: #ffd700; color: #000; border-color: #b45309; }
        }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="color: #ff4d4d; font-size: 50px;">"고햄찌 테트리스"</h1>
    <input type="text" id="player-name-input" placeholder="이름을 입력하세요" maxlength="8">
    <button class="btn start-btn" onclick="initGame()">입장하기</button>
</div>

<div id="main-wrapper">
    <div id="ui-left-top">
        <div class="ui-box">
            <div style="font-size: 12px; color: #ffcc00;">NEXT</div>
            <canvas id="next-canvas" width="60" height="60"></canvas>
        </div>
        <div class="ui-box">
            <div style="font-size: 12px; color: #ffcc00;">SCORE</div>
            <div id="score-val" style="font-size: 20px; color: #4ade80;">0</div>
        </div>
        <div class="ui-box">
            <div style="font-size: 12px; color: #ffcc00; margin-bottom: 5px;">RANK (TOP 3)</div>
            <div id="ranking-list"></div>
        </div>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%;">
        <div id="main-container">
            <div id="curtain-left" class="curtain"></div>
            <div id="curtain-right" class="curtain"></div>
            
            <div id="result-screen">
                <h1 style="color: #333; margin: 0;">FINAL SCORE</h1>
                <div id="final-score-num">0</div>
                <button class="btn reset-btn" onclick="location.reload()">AGAIN?</button>
            </div>

            <div id="game-section">
                <canvas id="tetris" width="240" height="400"></canvas>
            </div>
            
            <div id="control-section">
                <div style="background: rgba(0,0,0,0.5); text-align: center;">
                    <h2 id="stage-display" style="color: #ffcc00;">STAGE 1</h2>
                    <p>Target: <span id="target-lines">3</span> | Lines: <span id="current-lines">0</span></p>
                </div>
                <div id="gold-display">GOLD (0)</div>
                <button class="btn start-btn" id="play-pause-btn" onclick="togglePlay(); this.blur();">START</button>
                <div class="pc-desc" style="font-size: 11px; color: #ccc; text-align: center; width: 100%;">↑:회전 | ↓:2칸 | Space:하드드랍 | 0:골드</div>
            </div>
        </div>

        <div id="mobile-controls">
            <div class="control-row">
                <button class="m-btn" onclick="actionRotate()">↻</button>
                <button class="m-btn gold-btn" onclick="actionGold()">✨</button>
            </div>
            <div class="control-row">
                <button class="m-btn" onclick="actionLeft()">←</button>
                <button class="m-btn" onclick="actionDown()">↓</button>
                <button class="m-btn" onclick="actionRight()">→</button>
            </div>
            <div class="control-row">
                <button class="m-btn hard" onclick="actionHardDrop()">SPACE (HARD DROP)</button>
            </div>
        </div>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const nextCanvas = document.getElementById('next-canvas');
    const nextContext = nextCanvas.getContext('2d');
    
    // 내부 좌표 스케일
    context.scale(20, 20);
    nextContext.scale(15, 15);

    const hamsterImg = new Image();
    hamsterImg.src = "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Animals/Hamster.png";

    let playerName = "";
    let gameRunning = false;
    let animReq, musicInterval;
    let stage = 1, linesInStage = 0, goldLinesCounter = 0, goldCount = 0, currentScore = 0;
    let dropInterval = 1000, dropCounter = 0, lastTime = 0;
    
    const colors = [null, '#FF5E5E', '#5EFF5E', '#5E5EFF', '#FFFF5E', '#FFB35E', '#B35EFF', '#5EFFFF', '#777777'];
    const arena = Array.from({length: 20}, () => Array(12).fill(0));
    const player = { pos: {x: 0, y: 0}, matrix: null, next: null };

    const summerMelody = [
        {f: 293.66, t: 250}, {f: 392.00, t: 250}, {f: 440.00, t: 250}, {f: 493.88, t: 500}, 
        {f: 493.88, t: 250}, {f: 587.33, t: 250}, {f: 523.25, t: 250}, {f: 493.88, t: 250}, 
        {f: 440.00, t: 500}, {f: 392.00, t: 250}, {f: 392.00, t: 250}, {f: 440.00, t: 250}, 
        {f: 493.88, t: 500}, {f: 440.00, t: 750}, {f: 0,      t: 250}
    ];
    let summerIdx = 0;

    function initGame() {
        playerName = document.getElementById('player-name-input').value.trim() || "Guest";
        document.getElementById('start-screen').style.display = 'none';
        updateRankingUI();
        if(audioCtx.state === 'suspended') audioCtx.resume();
    }

    function togglePlay() {
        if (!gameRunning) {
            gameRunning = true;
            if (!player.matrix) playerReset();
            lastTime = performance.now();
            playSummerBGM();
            update();
            document.getElementById('play-pause-btn').innerText = "PAUSE";
        } else {
            gameRunning = false;
            cancelAnimationFrame(animReq);
            clearTimeout(musicInterval);
            document.getElementById('play-pause-btn').innerText = "RESUME";
        }
    }

    function playSound(freq, dur, vol=0.1, type='square') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function playSummerBGM() {
        if (!gameRunning) return;
        const note = summerMelody[summerIdx];
        if (note.f !== 0) playSound(note.f, (note.t / 1000) * 0.9, 0.08, 'triangle');
        summerIdx = (summerIdx + 1) % summerMelody.length;
        musicInterval = setTimeout(playSummerBGM, note.t);
    }

    function updateRankingUI() {
        let ranks = JSON.parse(localStorage.getItem('circusRanks') || "[]");
        const list = document.getElementById('ranking-list');
        list.innerHTML = "";
        const trophies = ['🏆', '🥈', '🥉'];
        ranks.sort((a,b) => b.score - a.score).slice(0, 3).forEach((r, i) => {
            list.innerHTML += `<div class="rank-item"><span>${trophies[i]} ${r.name}</span> <span>${r.score}</span></div>`;
        });
    }

    function saveRank() {
        let ranks = JSON.parse(localStorage.getItem('circusRanks') || "[]");
        ranks.push({name: playerName, score: currentScore});
        ranks.sort((a,b) => b.score - a.score);
        localStorage.setItem('circusRanks', JSON.stringify(ranks.slice(0, 10)));
    }

    function gameOver() {
        gameRunning = false;
        cancelAnimationFrame(animReq);
        clearTimeout(musicInterval);
        saveRank();
        document.getElementById('main-container').classList.add('game-over');
        [523, 659, 783, 1046].forEach((f, i) => playSound(f, 0.6, 0.15, 'sawtooth'));

        for(let i=0; i<40; i++) {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = '-20px';
            p.style.width = p.style.height = (Math.random() * 8 + 5) + 'px';
            p.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
            p.style.animationDuration = (Math.random() * 2 + 1) + 's';
            document.getElementById('main-container').appendChild(p);
        }

        setTimeout(() => {
            document.getElementById('result-screen').style.display = 'flex';
            let count = 0;
            const target = currentScore;
            const timer = setInterval(() => {
                count += Math.ceil(target / 40) || 1;
                if (count >= target) { count = target; clearInterval(timer); }
                document.getElementById('final-score-num').innerText = count;
                playSound(1000 + (count % 200), 0.05, 0.03, 'sine');
            }, 30);
        }, 1500);
    }

    function createPiece(type) {
        if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
        if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
        if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
        if (type === 'O') return [[4,4],[4,4]];
        if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
        if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
        if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        if (!player.next) player.next = createPiece(pieces[Math.random() * pieces.length | 0]);
        player.matrix = player.next;
        player.next = createPiece(pieces[Math.random() * pieces.length | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) gameOver();
        if (stage >= 4 && Math.random() < 0.2) riseGarbage();
    }

    function riseGarbage() {
        arena.shift();
        const row = Array(12).fill(8);
        row[Math.floor(Math.random() * 12)] = 0;
        arena.push(row);
    }

    function arenaSweep() {
        let count = 0;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) if (arena[y][x] === 0) continue outer;
            arena.splice(y, 1);
            arena.unshift(Array(12).fill(0));
            ++y; count++;
        }
        if (count > 0) {
            linesInStage += count;
            currentScore += (count * 150) * stage;
            if (stage >= 4) {
                goldLinesCounter += count;
                while (goldLinesCounter >= 15) { goldCount++; goldLinesCounter -= 15; }
            }
            if (linesInStage >= (3 + (stage-1)*2)) {
                stage++; linesInStage = 0;
                dropInterval *= 0.88;
                playSound(1046, 0.4, 0.1, 'sawtooth');
            }
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('stage-display').innerText = `STAGE ${stage}`;
        document.getElementById('target-lines').innerText = 3 + (stage-1)*2;
        document.getElementById('current-lines').innerText = linesInStage;
        document.getElementById('score-val').innerText = currentScore;
        const gd = document.getElementById('gold-display');
        gd.innerText = stage < 4 ? "GOLD LOCKED" : `GOLD (${goldCount})`;
        if(stage >= 4) gd.classList.add('active');
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function drawGrid() {
        context.lineWidth = 0.05;
        context.strokeStyle = "rgba(255, 255, 255, 0.15)";
        for (let x = 0; x <= 12; x++) { context.beginPath(); context.moveTo(x, 0); context.lineTo(x, 20); context.stroke(); }
        for (let y = 0; y <= 20; y++) { context.beginPath(); context.moveTo(0, y); context.lineTo(12, y); context.stroke(); }
    }

    function draw() {
        context.fillStyle = '#000'; context.fillRect(0, 0, canvas.width, canvas.height);
        drawGrid(); 
        drawMatrix(arena, {x: 0, y: 0}, context);
        drawMatrix(player.matrix, player.pos, context);
        nextContext.fillStyle = '#000'; nextContext.fillRect(0, 0, 80, 80);
        drawMatrix(player.next, {x: 1, y: 1}, nextContext);
    }

    function drawMatrix(m, o, ctx) {
        m.forEach((row, y) => {
            row.forEach((v, x) => {
                if (v !== 0) {
                    ctx.fillStyle = colors[v];
                    ctx.fillRect(x + o.x, y + o.y, 1, 1);
                    if (hamsterImg.complete) {
                        ctx.drawImage(hamsterImg, x + o.x, y + o.y, 1, 1);
                    }
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.05;
                    ctx.strokeRect(x + o.x, y + o.y, 1, 1);
                }
            });
        });
    }

    function update(time = 0) {
        if (!gameRunning) return;
        const dt = time - lastTime; lastTime = time;
        dropCounter += dt;
        if (dropCounter > dropInterval) { 
            player.pos.y++; 
            if(collide(arena, player)){ 
                player.pos.y--; merge(arena, player); playerReset(); arenaSweep(); 
            } 
            dropCounter = 0; 
        }
        draw();
        animReq = requestAnimationFrame(update);
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((v, x) => { if(v !== 0) arena[y + player.pos.y][x + player.pos.x] = v; });
        });
    }

    // ================= 액션 함수 =================
    function actionLeft() { if (!gameRunning) return; player.pos.x--; if(collide(arena, player)) player.pos.x++; }
    function actionRight() { if (!gameRunning) return; player.pos.x++; if(collide(arena, player)) player.pos.x--; }
    function actionDown() { if (!gameRunning) return; for(let i=0; i<2; i++){ player.pos.y++; if(collide(arena, player)){ player.pos.y--; merge(arena, player); playerReset(); arenaSweep(); break; } } }
    function actionRotate() {
        if (!gameRunning) return;
        const m = player.matrix;
        for(let y=0; y<m.length; ++y) for(let x=0; x<y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]];
        m.forEach(row => row.reverse());
        if(collide(arena, player)) { 
            m.forEach(row => row.reverse()); 
            for(let y=0; y<m.length; ++y) for(let x=0; x<y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]]; 
        }
    }
    function actionHardDrop() { if (!gameRunning) return; while(!collide(arena, player)) player.pos.y++; player.pos.y--; merge(arena, player); playerReset(); arenaSweep(); }
    function actionGold() { if (!gameRunning) return; if(stage >= 4 && goldCount > 0) { goldCount--; arena.splice(-2, 2); arena.unshift(Array(12).fill(0), Array(12).fill(0)); updateUI(); playSound(200, 0.4); } }

    document.addEventListener('keydown', e => {
        if (e.keyCode === 80) { togglePlay(); return; }
        if (e.keyCode === 37) actionLeft();
        else if (e.keyCode === 39) actionRight();
        else if (e.keyCode === 38) actionRotate();
        else if (e.keyCode === 40) actionDown();
        else if (e.keyCode === 32) actionHardDrop();
        else if (e.keyCode === 48 || e.keyCode === 96) actionGold();
    });

    updateUI();
</script>
</body>
</html>
