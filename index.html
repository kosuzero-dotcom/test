<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>서커스 테트리스: 그랜드 피날레 (모바일 & 업그레이드)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

        :root {
            --neon-red: #ff4d4d;
            --neon-gold: #ffcc00;
            --neon-green: #4ade80;
            --bg-dark: #020617;
        }

        body {
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            background: radial-gradient(circle at center, #1e1b4b 0%, var(--bg-dark) 100%);
            font-family: 'Jua', sans-serif; 
            color: white; 
            overflow: hidden;
            touch-action: none; /* 모바일에서 화면 스크롤 방지 */
        }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* 시작 화면 */
        #start-screen, #result-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        
        #result-screen { display: none; z-index: 600; }

        h1.title {
            color: var(--neon-red); 
            font-size: 50px; 
            text-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-red);
            text-align: center;
            margin: 0 0 20px 0;
        }

        #player-name-input {
            padding: 15px; font-size: 20px; border-radius: 10px; border: 2px solid var(--neon-gold); 
            margin: 20px; font-family: 'Jua'; text-align: center;
            background: rgba(0,0,0,0.5); color: white; outline: none;
        }
        #player-name-input:focus { box-shadow: 0 0 15px var(--neon-gold); }

        /* 메인 컨테이너 (반응형) */
        #main-container {
            display: flex; 
            flex-direction: row;
            width: 100%; max-width: 900px; height: 100%; max-height: 800px;
            background: rgba(255, 255, 255, 0.02); 
            border: 2px solid var(--neon-red);
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.3), inset 0 0 20px rgba(255, 77, 77, 0.2);
            position: relative; overflow: hidden;
        }

        /* 왼쪽 상단 UI (데스크탑은 고정, 모바일은 컨테이너 내부 배치) */
        #ui-panel {
            display: flex; flex-direction: column; gap: 10px; padding: 15px;
            width: 180px; flex-shrink: 0; z-index: 100;
            border-right: 2px solid rgba(255, 77, 77, 0.5);
            background: rgba(0,0,0,0.3);
        }
        
        .ui-box {
            background: rgba(0, 0, 0, 0.6); border: 2px solid var(--neon-gold);
            border-radius: 15px; padding: 10px; text-align: center;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
        }
